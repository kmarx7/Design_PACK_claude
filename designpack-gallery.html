<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DesignPack AI — 트렌드 템플릿 갤러리</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&family=Archivo+Black&family=Instrument+Serif:ital@0;1&family=JetBrains+Mono:wght@400;700&family=Fraunces:opsz,wght@9..144,400;9..144,600&display=swap" rel="stylesheet">
<style>
  *{margin:0;padding:0;box-sizing:border-box}
  :root{--bg:#0a0a0c;--panel:#121217;--line:#22222b;--ink:#f4f4f0;--dim:#8a8a96;--mono:'JetBrains Mono',monospace;--sans:'Space Grotesk',sans-serif}
  html{scroll-behavior:smooth}
  body{background:var(--bg);color:var(--ink);font-family:var(--sans);-webkit-font-smoothing:antialiased;overflow-x:hidden}
  .wrap{max-width:1200px;margin:0 auto;padding:0 24px}
  header{padding:80px 0 40px;text-align:center;position:relative}
  header::before{content:"";position:absolute;inset:0;background:radial-gradient(60% 80% at 50% 0%,rgba(255,107,95,.12),transparent 70%);pointer-events:none}
  .kicker{font-family:var(--mono);font-size:12px;letter-spacing:.3em;text-transform:uppercase;color:var(--dim);margin-bottom:20px}
  header h1{font-size:clamp(34px,6vw,64px);line-height:1.02;font-weight:700;letter-spacing:-.03em;max-width:820px;margin:0 auto}
  header h1 em{font-family:'Instrument Serif',serif;font-style:italic;font-weight:400;color:#ff6b5f}
  header p{margin:24px auto 0;max-width:580px;color:var(--dim);font-size:16px;line-height:1.6}
  .hint{margin:20px auto 0;display:inline-flex;align-items:center;gap:8px;font-family:var(--mono);font-size:11.5px;color:var(--dim);border:1px solid var(--line);padding:8px 14px;border-radius:30px}
  .hint b{color:#ff6b5f}
  .grid{display:grid;grid-template-columns:repeat(2,1fr);gap:28px;padding:30px 0 100px}
  @media(max-width:780px){.grid{grid-template-columns:1fr}}
  .card{background:var(--panel);border:1px solid var(--line);border-radius:18px;overflow:hidden;opacity:0;transform:translateY(24px);animation:rise .7s cubic-bezier(.2,.7,.3,1) forwards;transition:border-color .3s,transform .3s}
  .card:hover{border-color:#3a3a48;transform:translateY(-4px)}
  @keyframes rise{to{opacity:1;transform:translateY(0)}}
  .preview{height:230px;position:relative;overflow:hidden;display:flex;align-items:center;justify-content:center;transition:--c1 .3s}
  .meta{padding:20px 22px 24px;border-top:1px solid var(--line)}
  .meta .tag{font-family:var(--mono);font-size:10.5px;letter-spacing:.2em;text-transform:uppercase;color:var(--dim)}
  .meta h3{font-size:21px;font-weight:700;letter-spacing:-.02em;margin:6px 0 8px}
  .meta p{font-size:13.5px;color:var(--dim);line-height:1.55}
  .pal-label{font-family:var(--mono);font-size:10px;color:var(--dim);letter-spacing:.15em;text-transform:uppercase;margin-top:16px;display:block}
  .palettes{display:flex;flex-direction:column;gap:8px;margin-top:10px}
  .pal-btn{display:flex;align-items:center;gap:10px;background:transparent;border:1px solid var(--line);border-radius:10px;padding:8px 10px;cursor:pointer;transition:all .18s;width:100%}
  .pal-btn:hover{border-color:#4a4a58;background:rgba(255,255,255,.02)}
  .pal-btn.active{border-color:#ff6b5f;background:rgba(255,107,95,.08)}
  .pal-btn .chips{display:flex;gap:5px;flex:1}
  .pal-btn .chips span{width:24px;height:24px;border-radius:6px;border:1px solid rgba(255,255,255,.1)}
  .pal-btn .pname{font-family:var(--mono);font-size:10.5px;color:var(--dim);min-width:62px;text-align:left}
  .pal-btn.active .pname{color:#ff6b5f}
  .usebtn{margin-top:16px;display:inline-flex;align-items:center;gap:8px;font-family:var(--mono);font-size:11.5px;letter-spacing:.05em;color:var(--ink);background:transparent;border:1px solid var(--line);padding:9px 14px;border-radius:8px;cursor:pointer;transition:all .2s}
  .usebtn:hover{background:#ff6b5f;border-color:#ff6b5f;color:#0a0a0c}

  /* ===== preview structural styles (colors set inline via var) ===== */
  .preview > div{width:100%;height:100%}

  /* 1 Brutalism */
  .p1{padding:22px;display:flex;flex-direction:column;justify-content:space-between}
  .p1 .b-top{display:flex;justify-content:space-between;align-items:flex-start}
  .p1 .b-dot{width:14px;height:14px;border:2px solid;border-radius:50%}
  .p1 .b-num{font-family:var(--mono);font-size:11px}
  .p1 h4{font-family:'Archivo Black',sans-serif;font-size:36px;line-height:.9;text-transform:uppercase;letter-spacing:-.02em}
  .p1 .b-row{display:flex;gap:8px}
  .p1 .b-btn{border:2px solid;padding:6px 12px;font-family:var(--mono);font-size:11px}

  /* 2 Glass */
  .p2{position:relative}
  .p2 .orb{position:absolute;width:140px;height:140px;border-radius:50%;filter:blur(8px);top:-30px;right:-20px;opacity:.8}
  .p2 .glass{position:absolute;inset:34px;border-radius:18px;background:rgba(255,255,255,.14);backdrop-filter:blur(18px);border:1px solid rgba(255,255,255,.35);padding:18px;display:flex;flex-direction:column;justify-content:space-between;box-shadow:0 20px 50px rgba(0,0,0,.25)}
  .p2 .glass h4{font-size:18px;color:#fff;font-weight:500}
  .p2 .pill{align-self:flex-start;background:rgba(255,255,255,.3);border:1px solid rgba(255,255,255,.4);border-radius:20px;padding:5px 14px;font-size:11px;color:#fff;backdrop-filter:blur(10px)}
  .p2 .gbar{height:8px;border-radius:6px;background:rgba(255,255,255,.45)}

  /* 3 Dark Premium */
  .p3{padding:24px;display:flex;flex-direction:column;justify-content:center;align-items:center;text-align:center}
  .p3 .badge{font-family:var(--mono);font-size:10px;letter-spacing:.2em;border:1px solid;border-radius:20px;padding:4px 12px;margin-bottom:16px;text-transform:uppercase}
  .p3 h4{font-size:26px;font-weight:700;letter-spacing:-.03em;line-height:1.1}
  .p3 .cta{margin-top:18px;font-size:12px;padding:8px 18px;border-radius:9px;box-shadow:0 8px 24px rgba(0,0,0,.4)}

  /* 4 Y2K */
  .p4{padding:20px;display:flex;flex-direction:column;justify-content:space-between;background-image:linear-gradient(rgba(255,255,255,.06) 1px,transparent 1px),linear-gradient(90deg,rgba(255,255,255,.06) 1px,transparent 1px);background-size:22px 22px}
  .p4 h4{font-family:'Archivo Black',sans-serif;font-size:30px;text-transform:uppercase;line-height:.95}
  .p4 .chrome{align-self:flex-start;font-family:var(--mono);font-size:11px;border:1px solid;padding:5px 12px}
  .p4 .y2k-grid{display:flex;gap:6px}
  .p4 .y2k-grid span{flex:1;height:6px}

  /* 5 Nature */
  .p5{padding:24px;display:flex;flex-direction:column;justify-content:space-between}
  .p5 h4{font-family:'Fraunces',serif;font-size:30px;line-height:1;font-weight:600}
  .p5 .leaf{width:36px;height:36px;border-radius:50% 0 50% 50%}
  .p5 p{font-size:12px;line-height:1.5;max-width:80%}
  .p5 .e-row{display:flex;gap:8px;align-items:center}
  .p5 .e-btn{font-family:'Fraunces',serif;font-size:12px;padding:7px 16px;border-radius:30px}
  .p5 .e-dot{width:10px;height:10px;border-radius:50%}

  /* 6 Dopamine */
  .p6{padding:20px;display:flex;flex-direction:column;justify-content:space-between;position:relative;overflow:hidden}
  .p6 .d-blob{position:absolute;width:120px;height:120px;border-radius:50%;bottom:-30px;left:-20px}
  .p6 .d-star{position:absolute;font-size:60px;top:6px;right:14px;transform:rotate(12deg)}
  .p6 h4{font-family:'Archivo Black',sans-serif;font-size:34px;line-height:.85;text-transform:uppercase;position:relative;z-index:2}
  .p6 .d-btn{align-self:flex-start;font-family:'Archivo Black',sans-serif;font-size:13px;padding:9px 18px;border-radius:40px;position:relative;z-index:2;text-transform:uppercase}

  /* 7 Bento */
  .p7{padding:16px;display:grid;grid-template-columns:1.4fr 1fr;grid-template-rows:1fr 1fr;gap:10px}
  .p7 > div{border-radius:12px;border:1px solid;padding:12px;display:flex;flex-direction:column;justify-content:space-between}
  .p7 .b-a{grid-row:span 2}
  .p7 .b-a h4{font-size:20px;font-weight:700;letter-spacing:-.02em;color:#fff}
  .p7 .stat{font-family:var(--mono);font-size:22px;font-weight:700;color:#fff}
  .p7 .b-c .stat,.p7 .b-c .lbl{color:rgba(0,0,0,.7)}
  .p7 .lbl{font-family:var(--mono);font-size:9px;color:var(--dim);text-transform:uppercase;letter-spacing:.1em}

  /* 8 Kinetic */
  .p8{padding:0;display:flex;align-items:center;overflow:hidden}
  .p8 .ticker{white-space:nowrap;animation:slide 9s linear infinite}
  .p8 .ticker span{font-family:'Archivo Black',sans-serif;font-size:52px;text-transform:uppercase;letter-spacing:-.02em;margin-right:10px}
  @keyframes slide{from{transform:translateX(0)}to{transform:translateX(-50%)}}

  /* 9 Neumorphism */
  .p9{padding:26px;display:flex;flex-direction:column;justify-content:center;gap:16px;align-items:center}
  .p9 .card9{border-radius:20px;padding:18px 22px;width:100%}
  .p9 .card9 h4{font-size:17px;color:#4a5568;font-weight:500}
  .p9 .toggle{width:54px;height:28px;border-radius:20px;position:relative}
  .p9 .toggle span{position:absolute;width:20px;height:20px;border-radius:50%;top:4px;right:4px}
  .p9 .nrow{display:flex;justify-content:space-between;align-items:center}

  /* 10 Editorial */
  .p10{padding:26px;display:flex;flex-direction:column;justify-content:space-between}
  .p10 .rule{height:2px}
  .p10 .e-top{display:flex;justify-content:space-between;font-family:var(--mono);font-size:10px;letter-spacing:.1em;text-transform:uppercase}
  .p10 h4{font-family:'Fraunces',serif;font-size:34px;line-height:1;font-weight:600;font-style:italic}
  .p10 p{font-family:'Fraunces',serif;font-size:13px;line-height:1.5}

  /* 11 Clay */
  .p11{padding:24px;display:flex;flex-direction:column;justify-content:center;gap:16px}
  .p11 .clay-card{background:#fff;border-radius:30px;padding:18px 22px;display:flex;align-items:center;gap:14px}
  .p11 .clay-ico{width:48px;height:48px;border-radius:50%;display:flex;align-items:center;justify-content:center;color:#fff;font-size:22px;box-shadow:inset -3px -3px 8px rgba(0,0,0,.18),inset 3px 3px 6px rgba(255,255,255,.8)}
  .p11 h4{font-size:22px;font-weight:700}
  .p11 .clay-row{display:flex;gap:12px;align-items:center}
  .p11 .clay-btn{color:#fff;font-weight:700;padding:12px 26px;border-radius:30px}
  .p11 .clay-pill{flex:1;height:18px;border-radius:20px;background:#fff}

  /* 12 Aurora */
  .p12{position:relative;overflow:hidden;padding:30px;display:flex;align-items:center}
  .p12 .g1,.p12 .g2{position:absolute;border-radius:50%;filter:blur(22px)}
  .p12 .g1{width:200px;height:200px;top:-40px;left:-30px}
  .p12 .g2{width:220px;height:220px;bottom:-60px;right:-40px;opacity:.8}
  .p12 .aur-card{position:relative;z-index:2;background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.15);border-radius:18px;padding:20px;backdrop-filter:blur(10px)}
  .p12 .aur-tag{font-family:var(--mono);font-size:10px;letter-spacing:.2em;text-transform:uppercase}
  .p12 h4{font-size:24px;color:#fff;font-weight:700;margin-top:8px;line-height:1.05}

  /* 13 Spatial */
  .p13{position:relative;display:flex;align-items:center;justify-content:center;perspective:900px}
  .p13 .sp{position:absolute;border-radius:20px;border:1px solid;backdrop-filter:blur(8px)}
  .p13 .l1{width:160px;height:110px;transform:translate(-36px,26px) rotateY(26deg) rotateX(5deg);opacity:.42}
  .p13 .l2{width:180px;height:130px;transform:rotateY(8deg) translateZ(20px);display:flex;flex-direction:column;justify-content:center;align-items:center;box-shadow:0 30px 60px rgba(0,0,0,.55),0 0 0 1px rgba(255,255,255,.08)}
  .p13 .l2 h4{font-size:20px}.p13 .l2 span{font-family:var(--mono);font-size:10px;margin-top:4px}
  .p13 .l3{width:140px;height:90px;transform:translate(40px,-40px) rotateY(-20deg) rotateX(-4deg);opacity:.32}

  /* 14 Anti-Design */
  .p14{padding:18px;position:relative;overflow:hidden}
  .p14 .ad-a{position:absolute;top:14px;right:14px;font-family:'Archivo Black';font-size:16px;padding:4px 8px;transform:rotate(8deg)}
  .p14 h4{font-family:'Times New Roman',serif;font-size:42px;line-height:.85;font-weight:700;margin-top:30px;transform:rotate(-3deg)}
  .p14 .ad-b{display:inline-block;margin-top:12px;font-family:var(--mono);font-size:13px;padding:4px 10px;text-decoration:underline}
  .p14 .ad-c{position:absolute;bottom:16px;right:20px;font-family:'Comic Sans MS',cursive;font-size:15px;transform:rotate(-6deg)}

  /* 15 Swiss */
  .p15{padding:26px;display:flex;flex-direction:column;justify-content:space-between}
  .p15 .sw-top{display:flex;gap:14px;font-family:var(--mono);font-size:11px}
  .p15 h4{font-size:30px;font-weight:700;line-height:.98;letter-spacing:-.02em}
  .p15 .sw-bar{height:5px;width:60%}

  /* 16 Cyber HUD */
  .p16{padding:22px;font-family:var(--mono);display:flex;flex-direction:column;justify-content:space-between;position:relative;overflow:hidden}
  .p16::before{content:"";position:absolute;inset:0;background:repeating-linear-gradient(transparent,transparent 3px,rgba(255,255,255,.03) 4px);pointer-events:none}
  .p16 .hud-top{display:flex;justify-content:space-between;font-size:10px;letter-spacing:.1em}
  .p16 h4{font-size:30px;font-weight:700}
  .p16 .hud-bars{display:flex;gap:5px;height:30px;align-items:flex-end}
  .p16 .hud-bars span{flex:1;opacity:.75}
  .p16 .hud-bars span:nth-child(1){height:60%}.p16 .hud-bars span:nth-child(2){height:100%}.p16 .hud-bars span:nth-child(3){height:40%}.p16 .hud-bars span:nth-child(4){height:80%}

  /* 17 Pastel */
  .p17{padding:26px;display:flex;flex-direction:column;justify-content:center;align-items:center;position:relative;overflow:hidden}
  .p17 .pd-blob{position:absolute;width:120px;height:120px;border-radius:50%;filter:blur(6px);opacity:.6;top:20px;right:30px}
  .p17 h4{font-size:32px;font-weight:700;position:relative}
  .p17 .pd-btn{margin-top:16px;background:#fff;font-size:13px;padding:9px 22px;border-radius:30px;box-shadow:0 8px 20px rgba(0,0,0,.1);position:relative}

  /* 18 Vintage */
  .p18{padding:24px;display:flex;flex-direction:column;justify-content:center;position:relative}
  .p18 h4{font-family:'Archivo Black';font-size:46px;position:relative;letter-spacing:-.02em}
  .p18 h4 .vp-shadow{position:absolute;left:3px;top:3px;mix-blend-mode:multiply;z-index:-1}
  .p18 .vp-tag{font-family:var(--mono);font-size:11px;margin-top:8px}
  .p18 .vp-line{height:3px;margin-top:14px;width:50%;mix-blend-mode:multiply}

  /* 19 Chrome */
  .p19{padding:24px;display:flex;flex-direction:column;justify-content:center;align-items:center;gap:8px}
  .p19 .chrome-orb{width:96px;height:96px;border-radius:50%;position:relative;box-shadow:inset -10px -10px 26px rgba(0,0,0,.5),inset 5px 5px 12px rgba(255,255,255,.45),0 22px 44px rgba(200,200,210,.45),0 0 70px rgba(200,200,210,.12)}
  .p19 .chrome-orb::after{content:"";position:absolute;width:28%;height:28%;border-radius:50%;background:radial-gradient(circle,rgba(255,255,255,.96),transparent 65%);top:15%;left:18%;pointer-events:none}
  .p19 h4{font-family:'Archivo Black';font-size:30px;letter-spacing:.05em}
  .p19 .chrome-tag{font-family:var(--mono);font-size:10px;letter-spacing:.2em}

  /* 20 Blob */
  .p20{position:relative;overflow:hidden;display:flex;align-items:center;padding:26px}
  .p20 .ob-blob{position:absolute;width:230px;height:230px;border-radius:42% 58% 63% 37%/45% 38% 62% 55%;right:-60px;top:-40px;box-shadow:inset -12px -12px 32px rgba(0,0,0,.18),inset 8px 8px 20px rgba(255,255,255,.5),0 24px 48px rgba(0,0,0,.14)}
  .p20 .ob-content{position:relative;z-index:2}
  .p20 h4{font-size:30px;font-weight:700;line-height:1}
  .p20 .ob-btn{display:inline-flex;margin-top:12px;width:42px;height:42px;border-radius:50%;align-items:center;justify-content:center;font-size:18px}

  /* 21 High Contrast */
  .p21{padding:26px;display:flex;flex-direction:column;justify-content:space-between}
  .p21 h4{font-family:'Archivo Black';font-size:54px;line-height:.85;letter-spacing:-.02em}
  .p21 .hc-row{display:flex;justify-content:space-between;align-items:center}
  .p21 .hc-btn{font-family:'Archivo Black';font-size:14px;padding:10px 20px}
  .p21 .hc-arrow{font-size:30px}

  /* 22 Gradient Mesh */
  .p22{padding:26px;display:flex;flex-direction:column;justify-content:center}
  .p22 h4{font-size:32px;font-weight:700;letter-spacing:-.02em}
  .p22 .gm-btn{align-self:flex-start;margin-top:14px;background:rgba(255,255,255,.2);border:1px solid rgba(255,255,255,.4);font-size:12px;padding:8px 18px;border-radius:30px;backdrop-filter:blur(8px)}

  /* 23 Skeuomorphic */
  .p23{padding:24px;display:flex;align-items:center;justify-content:center}
  .p23 .sk-panel{border-radius:8px;padding:20px;width:100%;box-shadow:inset 0 1px 2px rgba(255,255,255,.5),0 6px 14px rgba(0,0,0,.5);border:1px solid}
  .p23 h4{font-family:'Fraunces',serif;font-size:20px}
  .p23 .sk-line{height:2px;margin-top:12px;border-bottom:1px solid rgba(255,255,255,.4)}

  /* 24 Cyberpunk */
  .p24{padding:24px;display:flex;flex-direction:column;justify-content:center;position:relative;overflow:hidden}
  .p24 .cp-tag{font-family:var(--mono);font-size:11px;letter-spacing:.2em}
  .p24 h4{font-family:'Archivo Black';font-size:38px;line-height:.85;margin-top:8px}
  .p24 .cp-line{height:2px;margin-top:16px}

  /* 25 Warm Minimal */
  .p25{padding:26px;display:flex;flex-direction:column;justify-content:space-between}
  .p25 .wm-tag{font-family:var(--mono);font-size:10px;letter-spacing:.2em;text-transform:uppercase}
  .p25 h4{font-family:'Fraunces',serif;font-size:34px;line-height:.95;font-weight:600}
  .p25 .wm-btn{align-self:flex-start;font-size:12px;padding:9px 22px;border-radius:4px}

  /* 26 3D */
  .p26{padding:24px;position:relative;overflow:hidden;display:flex;align-items:flex-end}
  .p26 .d3-sphere{position:absolute;width:126px;height:126px;border-radius:50%;top:10px;right:14px;box-shadow:inset -12px -12px 32px rgba(0,0,0,.3),inset 6px 6px 16px rgba(255,255,255,.8),0 32px 56px rgba(0,0,0,.18)}
  .p26 .d3-sphere::after{content:"";position:absolute;width:30%;height:30%;border-radius:50%;background:radial-gradient(circle,rgba(255,255,255,.95),transparent 65%);top:13%;left:17%;pointer-events:none}
  .p26 .d3-cube{position:absolute;width:52px;height:52px;border-radius:12px;top:104px;left:32px;transform:rotate(10deg);box-shadow:-6px 9px 0 color-mix(in srgb,var(--c3) 70%,#000),6px -6px 0 color-mix(in srgb,var(--c4) 55%,#fff),0 20px 36px rgba(0,0,0,.22)}
  .p26 .d3-cube::before{content:"";position:absolute;inset:0;border-radius:12px;background:linear-gradient(135deg,rgba(255,255,255,.45) 0%,transparent 55%,rgba(0,0,0,.08) 100%);pointer-events:none}
  .p26 h4{font-size:28px;font-weight:700;position:relative}

  /* 27 Blueprint */
  .p27{padding:24px;position:relative;display:flex;flex-direction:column;justify-content:center;background-size:26px 26px}
  .p27 .bp-cross{position:absolute;width:14px;height:14px}
  .p27 .bp-cross span:nth-child(1){position:absolute;width:14px;height:1px;top:7px}
  .p27 .bp-cross span:nth-child(2){position:absolute;height:14px;width:1px;left:7px}
  .p27 .tl{top:16px;left:16px}.p27 .br{bottom:16px;right:16px}
  .p27 h4{font-family:var(--mono);font-size:24px;letter-spacing:.05em}
  .p27 .bp-coord{font-family:var(--mono);font-size:11px;margin-top:8px}

  /* 28 Sticker */
  .p28{padding:24px;position:relative;display:flex;flex-direction:column;justify-content:center;align-items:center}
  .p28 .st-1{position:absolute;top:18px;left:18px;font-weight:700;font-size:12px;padding:5px 12px;border-radius:20px;transform:rotate(-10deg)}
  .p28 .st-2{position:absolute;top:20px;right:24px;font-size:34px;transform:rotate(12deg)}
  .p28 h4{font-size:30px;font-weight:700}

function getTemplateCSS(n){
  const num = parseInt(n);
  const prefix = '.p'+num;
  let css = '';
  let keyframes = '';
  try {
    for(const sheet of document.styleSheets){
      try {
        for(const rule of sheet.cssRules){
          const sel = rule.selectorText||'';
          if(sel===prefix||sel.startsWith(prefix+' ')||sel.startsWith(prefix+'>')||sel.startsWith(prefix+'.')||sel.startsWith(prefix+':')){
            css += rule.cssText+'\n';
          }
          // @keyframes rules have no selectorText — collect all of them
          if(rule.type===7){
            keyframes += rule.cssText+'\n';
          }
        }
      } catch(e){}
    }
  } catch(e){}
  return keyframes + css;
}

.hero{max-width:1100px;margin:0 auto;padding:60px 48px 80px;display:grid;grid-template-columns:1fr 1fr;gap:60px;align-items:center}
@media(max-width:780px){.hero{grid-template-columns:1fr;padding:40px 24px 60px}}
.hero-preview{height:340px;border-radius:18px;overflow:hidden;position:relative}
.hero-preview>div{width:100%;height:100%}
.hero-text .kicker{font-family:'JetBrains Mono',monospace;font-size:11px;letter-spacing:.3em;text-transform:uppercase;color:var(--c3);margin-bottom:18px;display:block}
.hero-text h1{font-size:clamp(30px,4vw,52px);font-weight:700;line-height:1.06;letter-spacing:-.03em;margin-bottom:18px}
.hero-text h1 span{color:var(--c1)}
.hero-text p{font-size:15px;color:${dim};line-height:1.65;margin-bottom:32px}
.btns{display:flex;gap:12px;flex-wrap:wrap}
.btn-p{background:var(--c1);color:${isDark?'#0a0a0c':'#f4f4f0'};border:none;padding:12px 26px;border-radius:10px;font-size:14px;font-weight:600;cursor:pointer;font-family:inherit;transition:opacity .2s}.btn-p:hover{opacity:.85}
.btn-o{background:transparent;color:${ink};border:1px solid ${border};padding:12px 26px;border-radius:10px;font-size:14px;font-weight:500;cursor:pointer;font-family:inherit;transition:all .2s}.btn-o:hover{border-color:var(--c1);color:var(--c1)}
/* ── features ── */
.features{padding:70px 48px;border-top:1px solid ${border};border-bottom:1px solid ${border}}
.features-inner{max-width:1100px;margin:0 auto}
.feat-label{font-family:'JetBrains Mono',monospace;font-size:11px;letter-spacing:.2em;text-transform:uppercase;color:${dim};margin-bottom:36px}
.feat-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:20px}
@media(max-width:720px){.feat-grid{grid-template-columns:1fr}}
.feat-card{background:${cardBg};border:1px solid ${border};border-radius:14px;padding:26px;transition:border-color .2s}.feat-card:hover{border-color:var(--c1)}
.feat-icon{width:40px;height:40px;border-radius:10px;background:var(--c1);margin-bottom:16px;display:flex;align-items:center;justify-content:center;font-size:18px}
.feat-card h3{font-size:16px;font-weight:700;margin-bottom:8px}
.feat-card p{font-size:13.5px;color:${dim};line-height:1.55}
/* ── cta ── */
.cta-sec{padding:90px 48px;text-align:center}
.cta-inner{max-width:560px;margin:0 auto}
.cta-inner h2{font-size:clamp(26px,4vw,44px);font-weight:700;letter-spacing:-.03em;margin-bottom:14px}
.cta-inner p{font-size:15px;color:${dim};margin-bottom:32px;line-height:1.6}
/* ── palette badge ── */
.pal{position:fixed;bottom:20px;right:20px;display:flex;gap:8px;align-items:center;background:${isDark?'rgba(20,20,30,.92)':'rgba(245,245,250,.92)'};backdrop-filter:blur(8px);border:1px solid ${border};border-radius:30px;padding:7px 14px}
.pal-name{font-family:'JetBrains Mono',monospace;font-size:10px;color:${dim};margin-right:4px}
.dot{width:16px;height:16px;border-radius:50%;border:1px solid ${border}}
</style></head><body>
<nav>
  <div class="logo">${svcname}</div>
  <div class="nav-links"><a href="#">기능</a><a href="#">요금제</a><a href="#">소개</a></div>
  <button class="nav-cta">시작하기</button>
</nav>
<section class="hero">
  <div class="hero-preview">
    ${t.html}
  </div>
  <div class="hero-text">
    <span class="kicker">${t.tag}</span>
    <h1>${svcname}으로<br><span>${svcdesc?svcdesc.split(' ').slice(0,3).join(' ')+'...':'새로운 경험을'}</span><br>시작하세요</h1>
    <p>${svcdesc||t.desc}${target?' · '+target+' 대상':''}</p>
    <div class="btns">
      <button class="btn-p">무료로 시작하기</button>

    </div>
  </div>
</section>
<section class="features">
  <div class="features-inner">
    <div class="feat-label">주요 기능</div>
    <div class="feat-grid">
      <div class="feat-card"><div class="feat-icon">⚡</div><h3>빠른 속도</h3><p>최적화된 성능으로 빠르고 부드러운 경험을 제공합니다.</p></div>
      <div class="feat-card"><div class="feat-icon">✦</div><h3>강력한 기능</h3><p>필요한 모든 기능을 하나의 플랫폼에서 사용하세요.</p></div>
      <div class="feat-card"><div class="feat-icon">◎</div><h3>간편한 사용</h3><p>직관적인 인터페이스로 누구나 쉽게 시작할 수 있습니다.</p></div>
    </div>
  </div>
</section>
<section class="cta-sec">
  <div class="cta-inner">
    <h2>지금 바로<br><span style="color:var(--c1)">${svcname}</span>을<br>경험하세요</h2>
    <p>${t.name} 스타일 · ${svcdesc||'새로운 시작을 도와드립니다.'}</p>
    <button class="btn-p" style="font-size:15px;padding:14px 34px">무료로 시작하기 →</button>
  </div>
</section>
<div class="pal">
  <span class="pal-name">${t.name}</span>
  <div class="dot" style="background:${c1}"></div>
  <div class="dot" style="background:${c2}"></div>
  <div class="dot" style="background:${c3}"></div>
  <div class="dot" style="background:${c4}"></div>
</div>
</body></html>`;
  const blob = new Blob([html],{type:'text/html'});
  window.open(URL.createObjectURL(blob),'_blank');
}
function copyStudio(){
  const text = document.getElementById('studio-output').textContent;
  navigator.clipboard.writeText(text).then(()=>{
    const btn = document.getElementById('studio-copybtn');
    btn.textContent = '✓ 복사됨';
    btn.classList.add('done');
    setTimeout(()=>{ btn.textContent='⎘ 복사'; btn.classList.remove('done'); }, 2000);
  });
}

// ── card render ─────────────────────────────────────────────────
const grid = document.getElementById('grid');

templates.forEach((t,i)=>{
  const card = document.createElement('div');
  card.className = 'card';
  card.id = 'card-'+t.n;
  card.style.animationDelay = (i*0.05)+'s';
  const pid = 'pv-'+t.n;
  const palBtns = t.palettes.map((p,idx)=>`
    <button class="pal-btn${idx===0?' active':''}" onclick="applyPal('${t.n}',${idx},this)">
      <span class="pname">${PAL_NAMES[idx]}</span>
      <span class="chips">${p.map(c=>`<span style="background:${c}"></span>`).join('')}</span>
    </button>`).join('');
  card.innerHTML=`
    <div class="preview" id="${pid}">
      ${t.html}
      <button class="fav-btn${favorites.has(t.n)?' active':''}" id="fav-${t.n}" onclick="toggleFav('${t.n}')">★</button>
    </div>
    <div class="meta">
      <span class="tag">${t.n} · ${t.tag}</span>
      <h3>${t.name}</h3>
      <p>${t.desc}</p>
      <span class="pal-label">컬러 조합</span>
      <div class="palettes">
        ${palBtns}
        <button class="pal-btn custom-trigger" id="ctrig-${t.n}" onclick="openCustom('${t.n}',this)">
          <span class="pname">직접입력</span>
          <span class="chips" id="cchips-${t.n}">
            <span></span><span></span><span></span><span></span>
          </span>
        </button>
        <div class="custom-panel" id="cpanel-${t.n}">
          <div class="custom-row"><span class="custom-lbl">C1</span><input type="color" class="custom-swatch" id="cc1-${t.n}" oninput="updateCustom('${t.n}')"><input type="text" class="custom-hex" id="ch1-${t.n}" maxlength="7" placeholder="#000000" oninput="hexSync('${t.n}',0,this)"></div>
          <div class="custom-row"><span class="custom-lbl">C2</span><input type="color" class="custom-swatch" id="cc2-${t.n}" oninput="updateCustom('${t.n}')"><input type="text" class="custom-hex" id="ch2-${t.n}" maxlength="7" placeholder="#000000" oninput="hexSync('${t.n}',1,this)"></div>
          <div class="custom-row"><span class="custom-lbl">C3</span><input type="color" class="custom-swatch" id="cc3-${t.n}" oninput="updateCustom('${t.n}')"><input type="text" class="custom-hex" id="ch3-${t.n}" maxlength="7" placeholder="#000000" oninput="hexSync('${t.n}',2,this)"></div>
          <div class="custom-row"><span class="custom-lbl">C4</span><input type="color" class="custom-swatch" id="cc4-${t.n}" oninput="updateCustom('${t.n}')"><input type="text" class="custom-hex" id="ch4-${t.n}" maxlength="7" placeholder="#000000" oninput="hexSync('${t.n}',3,this)"></div>
        </div>
      </div>
      <div class="action-row">
        <button class="copybtn" id="copybtn-${t.n}" onclick="copyHex('${t.n}')">⎘ HEX 복사</button>
        <button class="exportbtn" onclick="openExport('${t.n}')">↗ 내보내기</button>
        <button class="usebtn" onclick="openStudio('${t.n}')">⌁ 이 스타일로 생성하기</button>
      </div>
    </div>`;
  grid.appendChild(card);
  cardState[t.n] = {idx:0, colors:[...t.palettes[0]]};
  applyPal(t.n, 0);
});

// ── palette ──────────────────────────────────────────────────────
function applyPal(n, idx, btn){
  const t = templates.find(x=>x.n===n);
  const pv = document.getElementById('pv-'+n);
  const p = t.palettes[idx];
  ['--c1','--c2','--c3','--c4'].forEach((v,i)=>pv.style.setProperty(v,p[i]));
  cardState[n] = {idx, colors:[...p]};
  if(btn){
    btn.closest('.palettes').querySelectorAll('.pal-btn').forEach(b=>b.classList.remove('active'));
    btn.classList.add('active');
    const panel = document.getElementById('cpanel-'+n);
    if(panel) panel.classList.remove('open');
    resetChips(n);
  }
}
function openCustom(n, btn){
  const panel = document.getElementById('cpanel-'+n);
  if(panel.classList.contains('open')){
    panel.classList.remove('open');
    btn.classList.remove('active');
    return;
  }
  const cols = cardState[n]?.colors || ['#000000','#ffffff','#888888','#ffffff'];
  for(let i=1;i<=4;i++){
    document.getElementById('cc'+i+'-'+n).value = cols[i-1];
    document.getElementById('ch'+i+'-'+n).value = cols[i-1];
  }
  btn.closest('.palettes').querySelectorAll('.pal-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  panel.classList.add('open');
}
function updateCustom(n){
  const pv = document.getElementById('pv-'+n);
  const colors = [];
  for(let i=1;i<=4;i++){
    const c = document.getElementById('cc'+i+'-'+n).value;
    colors.push(c);
    pv.style.setProperty('--c'+i, c);
    document.getElementById('ch'+i+'-'+n).value = c;
  }
  cardState[n] = {idx:'custom', colors};
  const chips = document.getElementById('cchips-'+n)?.querySelectorAll('span');
  chips?.forEach((s,i)=>{ s.style.background=colors[i]; s.style.border='1px solid rgba(255,255,255,.1)'; });
}
function hexSync(n, ci, input){
  if(/^#[0-9a-fA-F]{6}$/.test(input.value)){
    document.getElementById('cc'+(ci+1)+'-'+n).value = input.value;
    updateCustom(n);
  }
}
function resetChips(n){
  const chips = document.getElementById('cchips-'+n)?.querySelectorAll('span');
  chips?.forEach(s=>{ s.style.background=''; s.style.border=''; });
}
function copyHex(n){
  const colors = cardState[n]?.colors || [];
  navigator.clipboard.writeText(colors.join(', ')).then(()=>{
    const btn = document.getElementById('copybtn-'+n);
    const orig = btn.textContent;
    btn.textContent = '✓ 복사됨';
    btn.classList.add('done');
    setTimeout(()=>{ btn.textContent=orig; btn.classList.remove('done'); }, 2000);
  });
}

// ── favorites ────────────────────────────────────────────────────
function toggleFav(n){
  if(favorites.has(n)) favorites.delete(n);
  else favorites.add(n);
  localStorage.setItem('dpfavs', JSON.stringify([...favorites]));
  document.getElementById('fav-'+n).classList.toggle('active', favorites.has(n));
  if(activeFilter==='★') applyFilter();
}

// ── filter ───────────────────────────────────────────────────────
function setFilter(k){
  activeFilter = k;
  document.querySelectorAll('.ftag').forEach(b=>b.classList.toggle('active', b.textContent===k));
  applyFilter();
}
function applyFilter(){
  const f = FILTERS.find(x=>x.k===activeFilter);
  templates.forEach(t=>{
    const card = document.getElementById('card-'+t.n);
    let show;
    if(!f || !f.ids) show = true;
    else if(f.ids==='favs') show = favorites.has(t.n);
    else show = f.ids.includes(t.n);
    card.style.display = show ? '' : 'none';
  });
}

// ── export / prompt ──────────────────────────────────────────────
function openExport(n){
  exportState = {n, tab:'claude'};
  const t = templates.find(x=>x.n===n);
  document.getElementById('modal-ttag').textContent = t.tag;
  document.getElementById('modal-tname').textContent = t.name;
  document.querySelectorAll('.mtab').forEach((b,i)=>b.classList.toggle('active', i===0));
  renderExport();
  document.getElementById('export-modal').classList.add('open');
  document.body.style.overflow = 'hidden';
}
function closeExport(){
  document.getElementById('export-modal').classList.remove('open');
  document.body.style.overflow = '';
}
function switchTab(tab, btn){
  exportState.tab = tab;
  document.querySelectorAll('.mtab').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  renderExport();
}
function renderExport(){
  document.getElementById('modal-content').textContent = generateExport(exportState.n, exportState.tab);
  const hints = {
    claude: 'Claude Code 채팅 또는 CLAUDE.md에 붙여넣기',
    v0:     'v0.dev 프롬프트 입력창에 붙여넣기',
    lovable:'Lovable 채팅창에 붙여넣기',
    cursor: 'Cursor 채팅 또는 .cursorrules에 추가',
    css:    '글로벌 CSS :root 블록에 붙여넣기',
    tailwind:'tailwind.config.js theme.extend.colors에 추가',
  };
  document.getElementById('modal-hint').textContent = hints[exportState.tab] || '';
}
function generateExport(n, tab){
  const t = templates.find(x=>x.n===n);
  const [c1,c2,c3,c4] = cardState[n]?.colors || t.palettes[0];
  if(tab==='claude') return `다음 디자인 시스템으로 UI 컴포넌트를 구현해줘.

스타일: ${t.tag} — ${t.name}
설명: ${t.desc}

컬러 팔레트:
  C1 (베이스):  ${c1}
  C2 (액센트): ${c2}
  C3 (서브):   ${c3}
  C4 (서피스): ${c4}

구현 조건:
- CSS 커스텀 프로퍼티 --c1~--c4를 :root에 선언하고 모든 색상은 변수만 참조
- 반응형 (모바일 1열 / 데스크탑 2열 이상)
- 호버 인터랙션 포함
- 외부 라이브러리 없이 vanilla CSS`;
  if(tab==='v0') return `Create a production-ready UI section with the "${t.name}" design system.

Style: ${t.tag}
${t.desc}

Colors (use exactly):
  Background/Base: ${c1}
  Accent/CTA:      ${c2}
  Secondary:       ${c3}
  Surface/Text:    ${c4}

Use Tailwind CSS. Include a hero section with heading, subtext, and CTA button. Follow ${t.tag} aesthetics precisely.`;
  if(tab==='lovable') return `${t.name} 스타일로 랜딩페이지 히어로 섹션 만들어줘.

${t.desc}

컬러:
  베이스:  ${c1}
  포인트: ${c2}
  서브:   ${c3}
  텍스트: ${c4}

"${t.tag}" 무드로 헤딩 + 서브텍스트 + CTA 버튼 포함해서 완성도 있게 만들어줘.`;
  if(tab==='cursor') return `// Design System: ${t.tag} — ${t.name}
// ${t.desc}

const designTokens = {
  colors: {
    base:    '${c1}', // background / dominant surface
    accent:  '${c2}', // primary CTA, highlight
    sub:     '${c3}', // secondary elements, borders
    surface: '${c4}', // text, icons on dark bg
  },
  style: '${t.tag}',
} as const;

// Task: build a React + Tailwind component using these tokens.
// Map: base→bg-*, accent→primary buttons, sub→borders/secondary, surface→text-*.`;
  if(tab==='css') return `/* ${t.tag} — ${t.name} */
:root {
  --c1: ${c1}; /* base */
  --c2: ${c2}; /* accent */
  --c3: ${c3}; /* sub */
  --c4: ${c4}; /* surface */
}`;
  if(tab==='tailwind') return `// tailwind.config.js — ${t.tag} (${t.name})
module.exports = {
  theme: {
    extend: {
      colors: {
        'brand-base':    '${c1}',
        'brand-accent':  '${c2}',
        'brand-sub':     '${c3}',
        'brand-surface': '${c4}',
      },
    },
  },
};`;
  return '';
}
function copyExport(){
  const text = document.getElementById('modal-content').textContent;
  navigator.clipboard.writeText(text).then(()=>{
    const btn = document.getElementById('modal-copybtn');
    const orig = btn.textContent;
    btn.textContent = '✓ 복사됨';
    btn.classList.add('done');
    setTimeout(()=>{ btn.textContent=orig; btn.classList.remove('done'); }, 2000);
  });
}

// ── misc ─────────────────────────────────────────────────────────
function pick(name){
  alert(name + ' 스타일을 선택했습니다.\n실제 서비스에서는 스튜디오(/studio)로 이동해 선택한 컬러 조합으로 디자인팩을 생성합니다.');
}
